services:
  booking_back_sevice:
    container_name: 'booking_back'
    build:
      context: .

    ports:
      - "7777:8000"
    networks:
      - myNetwork
    env_file:
      - .env

  booking_celery_worker_sevice:
    container_name: 'booking_celery_worker'
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'celery --app=src.tasks.celery_app:celery_instance worker -l INFO'

  booking_celery_beat_sevice:
    container_name: 'booking_celery_beat'
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: 'celery --app=src.tasks.celery_app:celery_instance beat -l INFO -B'

networks:
  myNetwork:
    external: true